name: Unit Tests

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: ascendia-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ascendia-backend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: ascendia-backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/ascendia-tests
          MONGODB_DBNAME: ascendia-tests
        run: npm run coverage
      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ascendia-backend/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }} # si tu repo lo necesita

      - name: Archive backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ascendia-backend/coverage
          retention-days: 7

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: ascendia-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ascendia-frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: ascendia-frontend
        env:
          CI: true
        run: npm run coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ascendia-frontend/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Archive frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ascendia-frontend/coverage
          retention-days: 7
