# SonarCloud configuration for Ascendia project
sonar.organization=ffdezgomez
sonar.projectKey=ffdezgomez_Ascendia

# Project information
sonar.projectName=Ascendia
sonar.projectVersion=1.0

# Source code paths
sonar.sources=ascendia-backend/src,ascendia-frontend/src
sonar.tests=ascendia-backend/test,ascendia-frontend/test

# Coverage reports
sonar.javascript.lcov.reportPaths=ascendia-backend/coverage/lcov.info,ascendia-frontend/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/build/**
sonar.test.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.js
